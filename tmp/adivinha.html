<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação - IFG</title>
    <style>
        .corpoDaPagina {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }

        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            width: 50px;
            margin-bottom: 10px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body class="corpoDaPagina">

<div class="container">
    <h1>Jogo de Adivinhação</h1>
    <p>Tente adivinhar o número secreto entre 1 e 100</p>
    <input type="number" id="TXTPalpite" min="1" max="100" />
    <button id="BTNAdivinhar" onclick="verificarPalpite()">Adivinhar</button>
    <div class="message" id="DIVMensagem"></div>
</div>

<script>
    let numeroSecreto = Math.floor(Math.random() * 100) + 1;
    let qtdTentativas = 5;

    function verificarPalpite() {
        const chuteDoJogador = parseInt(document.getElementById('TXTPalpite').value);
        const DIVMensagem = document.getElementById('DIVMensagem');

        if (isNaN(chuteDoJogador) || chuteDoJogador < 1 || chuteDoJogador > 100) {
            DIVMensagem.textContent = "Por favor, insira um número válido entre 1 e 100.";
            return;
        }

        qtdTentativas--;

        if (chuteDoJogador === numeroSecreto) {
            DIVMensagem.textContent = `Parabéns! Você acertou o número secreto ${numeroSecreto}.`;
            disableGame();
        } else if (qtdTentativas > 0) {
            if (chuteDoJogador > numeroSecreto) {
                DIVMensagem.textContent = `Errado! O número secreto é menor. Você tem ${qtdTentativas} tentativas restantes.`;
            } else {
                DIVMensagem.textContent = `Errado! O número secreto é maior. Você tem ${qtdTentativas} tentativas restantes.`;
            }
        } else {
            DIVMensagem.textContent = `Fim de jogo! O número secreto era ${numeroSecreto}.`;
            disableGame();
        }
    }

    function disableGame() {
        document.getElementById('BTNAdivinhar').disabled = true;
        document.getElementById('TXTPalpite').disabled = true;
    }
</script>

</body>
</html>
